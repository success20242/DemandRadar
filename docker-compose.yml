version: "3.9"

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: demandradar-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/demandradar
      PORT: 8000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: demandradar-frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  mongo_data:
